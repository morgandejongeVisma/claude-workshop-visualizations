<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude's Memory — Claude Workshop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=PT+Serif:wght@700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg: #f5f2eb;
      --color-text: #000000;
      --color-text-inv: #ffffff;
      --color-accent1: #d97757;
      --color-accent2: #cc9b7a;
      --color-accent3: #e9b19f;
      --vw: 1vw;
    }

    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
      color: var(--color-text);
    }

    .viewport {
      position: relative;
      background-image: url('../../background/background.png');
      background-size: cover;
      background-position: center;
      overflow: hidden;
    }

    .content-card {
      position: absolute;
      top: 4%;
      left: 3%;
      right: 3%;
      bottom: 12%;
      background: var(--color-bg);
      border-radius: calc(var(--vw) * 1.5);
      overflow: hidden;
      padding: calc(var(--vw) * 1.5);
      display: flex;
      gap: calc(var(--vw) * 1.5);
    }

    h1, h2, h3 {
      font-family: 'PT Serif', serif;
      font-weight: 700;
    }

    /* ── Navigation bar ─────────────────────────────────────── */
    .nav-bar {
      position: absolute;
      bottom: calc(var(--vw) * 1.2);
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: calc(var(--vw) * 1.5);
      z-index: 100;
    }

    .nav-btn {
      background: rgba(255, 255, 255, 0.25);
      border: none;
      color: var(--color-text-inv);
      font-size: calc(var(--vw) * 1.8);
      width: calc(var(--vw) * 3.5);
      height: calc(var(--vw) * 3.5);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      font-family: 'Montserrat', sans-serif;
    }

    .nav-btn:hover { background: rgba(255, 255, 255, 0.4); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }
    .nav-btn:disabled:hover { background: rgba(255, 255, 255, 0.25); }

    .nav-indicator {
      color: var(--color-text-inv);
      font-size: calc(var(--vw) * 1.4);
      font-weight: 600;
      min-width: calc(var(--vw) * 6);
      text-align: center;
      text-shadow: 0 1px 3px rgba(0,0,0,0.3);
    }

    /* ── Waffle Menu ── */
    .waffle-menu {
      position: absolute;
      top: calc(var(--vw) * 0.6);
      left: calc(var(--vw) * 1);
      z-index: 200;
    }
    .waffle-btn {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: calc(var(--vw) * 0.22);
      padding: calc(var(--vw) * 0.4);
      background: transparent;
      border: none;
      border-radius: calc(var(--vw) * 0.4);
      cursor: pointer;
      opacity: 0.2;
      transition: opacity 0.2s, background 0.2s;
    }
    .waffle-btn:hover { opacity: 0.6; background: rgba(0,0,0,0.04); }
    .waffle-btn.open { opacity: 0.6; background: rgba(0,0,0,0.04); }
    .waffle-dot {
      width: calc(var(--vw) * 0.32);
      height: calc(var(--vw) * 0.32);
      background: var(--color-text-inv);
      border-radius: 50%;
    }
    .waffle-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + var(--vw) * 0.2);
      left: 0;
      background: #fff;
      border-radius: calc(var(--vw) * 0.6);
      box-shadow: 0 calc(var(--vw) * 0.15) calc(var(--vw) * 0.8) rgba(0,0,0,0.15);
      min-width: calc(var(--vw) * 20);
      overflow: hidden;
      font-family: 'Montserrat', sans-serif;
    }
    .waffle-dropdown.open { display: block; }
    .waffle-dropdown-header {
      padding: calc(var(--vw) * 0.5) calc(var(--vw) * 0.9);
      font-size: calc(var(--vw) * 0.65);
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid #eee;
    }
    .waffle-dropdown a {
      display: flex;
      align-items: center;
      gap: calc(var(--vw) * 0.5);
      padding: calc(var(--vw) * 0.6) calc(var(--vw) * 0.9);
      text-decoration: none;
      color: var(--color-text);
      font-size: calc(var(--vw) * 0.85);
      font-weight: 600;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .waffle-dropdown a:hover { background: rgba(217,119,87,0.08); }
    .waffle-dropdown a.current {
      color: var(--color-accent1);
      background: rgba(217,119,87,0.06);
      pointer-events: none;
    }
    .waffle-dropdown a .viz-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: calc(var(--vw) * 1.5);
      height: calc(var(--vw) * 1.5);
      border-radius: 50%;
      background: #f0ede6;
      font-size: calc(var(--vw) * 0.65);
      font-weight: 700;
      color: #999;
      flex-shrink: 0;
    }
    .waffle-dropdown a.current .viz-num {
      background: var(--color-accent1);
      color: var(--color-text-inv);
    }

    /* ── Two-column layout ──────────────────────────────────── */
    .col-conversations {
      flex: 0 0 55%;
      display: flex;
      flex-direction: column;
      gap: calc(var(--vw) * 1.2);
      min-height: 0;
      overflow: hidden;
    }

    .col-memory {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      min-height: 0;
      gap: calc(var(--vw) * 1);
    }

    /* ── Chat windows ───────────────────────────────────────── */
    .chat-window {
      flex: 1;
      min-height: 0;
      background: #fff;
      border-radius: calc(var(--vw) * 0.8);
      border: 2px solid #ddd;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background: var(--color-accent1);
      color: var(--color-text-inv);
      padding: calc(var(--vw) * 0.4) calc(var(--vw) * 1);
      font-weight: 600;
      font-size: calc(var(--vw) * 1);
      display: flex;
      align-items: center;
      gap: calc(var(--vw) * 0.4);
      flex-shrink: 0;
    }

    .chat-header .dot {
      width: calc(var(--vw) * 0.4);
      height: calc(var(--vw) * 0.4);
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
    }

    .chat-messages {
      flex: 1;
      min-height: 0;
      padding: calc(var(--vw) * 0.6);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: calc(var(--vw) * 0.4);
    }

    .chat-bubble {
      max-width: 88%;
      padding: calc(var(--vw) * 0.45) calc(var(--vw) * 0.7);
      border-radius: calc(var(--vw) * 0.5);
      font-size: calc(var(--vw) * 0.95);
      line-height: 1.45;
    }

    .chat-bubble.user {
      background: var(--color-accent1);
      color: var(--color-text-inv);
      align-self: flex-end;
      border-bottom-right-radius: calc(var(--vw) * 0.1);
    }

    .chat-bubble.claude {
      background: #f0ede6;
      color: var(--color-text);
      align-self: flex-start;
      border-bottom-left-radius: calc(var(--vw) * 0.1);
    }

    .chat-input {
      border-top: 1px solid #ddd;
      padding: calc(var(--vw) * 0.3) calc(var(--vw) * 0.5);
      display: flex;
      gap: calc(var(--vw) * 0.3);
      flex-shrink: 0;
    }

    .chat-input-field {
      flex: 1;
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: calc(var(--vw) * 0.35);
      padding: calc(var(--vw) * 0.25) calc(var(--vw) * 0.5);
      font-size: calc(var(--vw) * 0.8);
      font-family: 'Montserrat', sans-serif;
      color: #999;
    }

    .chat-input-send {
      background: var(--color-accent1);
      border: none;
      color: white;
      border-radius: calc(var(--vw) * 0.35);
      padding: calc(var(--vw) * 0.25) calc(var(--vw) * 0.5);
      font-size: calc(var(--vw) * 0.75);
      cursor: default;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
    }

    /* Dimmed state for first conversation */
    .chat-window.dimmed {
      opacity: 0.45;
    }

    /* ── Memory panel ───────────────────────────────────────── */
    .memory-header {
      font-family: 'PT Serif', serif;
      font-weight: 700;
      font-size: calc(var(--vw) * 1.6);
      color: var(--color-text);
      display: flex;
      align-items: center;
      gap: calc(var(--vw) * 0.5);
    }

    .memory-icon {
      width: calc(var(--vw) * 2.2);
      height: calc(var(--vw) * 2.2);
      background: var(--color-accent1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text-inv);
      font-size: calc(var(--vw) * 1.2);
      flex-shrink: 0;
    }

    .memory-cards {
      display: flex;
      flex-direction: column;
      gap: calc(var(--vw) * 0.8);
    }

    .memory-card {
      background: #fff;
      border: 2px solid var(--color-accent2);
      border-radius: calc(var(--vw) * 0.6);
      padding: calc(var(--vw) * 0.7) calc(var(--vw) * 1);
      font-size: calc(var(--vw) * 1.05);
      font-weight: 600;
      color: var(--color-text);
      display: flex;
      align-items: center;
      gap: calc(var(--vw) * 0.5);
      opacity: 0;
      position: relative;
    }

    .memory-card .card-dot {
      width: calc(var(--vw) * 0.65);
      height: calc(var(--vw) * 0.65);
      background: var(--color-accent1);
      border-radius: 50%;
      flex-shrink: 0;
    }

    .memory-card.active {
      border-color: var(--color-accent1);
      box-shadow: 0 0 0 calc(var(--vw) * 0.2) rgba(217, 119, 87, 0.2);
    }

    .memory-empty {
      color: #bbb;
      font-size: calc(var(--vw) * 1.15);
      font-style: italic;
      text-align: center;
      padding: calc(var(--vw) * 0.5) 0;
    }

    .auto-saved-label {
      font-size: calc(var(--vw) * 0.85);
      color: #999;
      font-style: italic;
      text-align: center;
      opacity: 0;
    }

    /* ── Connection lines (SVG overlay) ─────────────────────── */
    .connection-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 50;
    }

    .connection-overlay line {
      stroke: var(--color-accent2);
      stroke-width: 2;
      stroke-dasharray: 6 4;
      opacity: 0;
    }

    .connection-overlay circle {
      fill: var(--color-accent2);
      opacity: 0;
    }
  </style>
</head>
<body>
  <div class="viewport" id="viewport">
    <div class="content-card" id="contentCard">

      <!-- LEFT: Conversations column -->
      <div class="col-conversations">

        <!-- Conversation 1 -->
        <div class="chat-window" id="conv1" style="opacity: 0;">
          <div class="chat-header">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <span style="margin-left: calc(var(--vw) * 0.3);">Conversation 1</span>
          </div>
          <div class="chat-messages" id="conv1Messages"></div>
          <div class="chat-input">
            <div class="chat-input-field">Type a message...</div>
            <div class="chat-input-send">Send</div>
          </div>
        </div>

        <!-- Conversation 2 -->
        <div class="chat-window" id="conv2" style="opacity: 0;">
          <div class="chat-header">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <span style="margin-left: calc(var(--vw) * 0.3);">Conversation 2</span>
          </div>
          <div class="chat-messages" id="conv2Messages"></div>
          <div class="chat-input">
            <div class="chat-input-field">Type a message...</div>
            <div class="chat-input-send">Send</div>
          </div>
        </div>

      </div>

      <!-- RIGHT: Memory panel -->
      <div class="col-memory">
        <div class="memory-cards" id="memoryCards">
          <div class="memory-header" id="memoryHeader">
            <div class="memory-icon">&#x1D5E0;</div>
            <span>Claude's Memory</span>
          </div>
          <div class="memory-empty" id="memoryEmpty">No memories yet</div>
          <div class="memory-card" id="mem0"><span class="card-dot"></span>Marketing at Idella</div>
          <div class="memory-card" id="mem1"><span class="card-dot"></span>Pension administration software</div>
          <div class="memory-card" id="mem2"><span class="card-dot"></span>Audience: Dutch pension funds &amp; administrators</div>
          <div class="memory-card" id="mem3"><span class="card-dot"></span>Brand voice: professional but approachable</div>
        </div>

        <div class="auto-saved-label" id="autoSavedLabel">Saved automatically</div>
      </div>

      <!-- SVG overlay for connection lines -->
      <svg class="connection-overlay" id="connectionOverlay">
        <line id="connLine0" />
        <circle id="connDot0s" r="4" />
        <circle id="connDot0e" r="4" />
        <line id="connLine1" />
        <circle id="connDot1s" r="4" />
        <circle id="connDot1e" r="4" />
        <line id="connLine2" />
        <circle id="connDot2s" r="4" />
        <circle id="connDot2e" r="4" />
        <line id="connLine3" />
        <circle id="connDot3s" r="4" />
        <circle id="connDot3e" r="4" />
      </svg>

    </div>

    <!-- Waffle Menu -->
    <div class="waffle-menu" id="waffleMenu">
      <button class="waffle-btn" id="waffleBtn" aria-label="Visualization menu">
        <span class="waffle-dot"></span><span class="waffle-dot"></span><span class="waffle-dot"></span>
        <span class="waffle-dot"></span><span class="waffle-dot"></span><span class="waffle-dot"></span>
        <span class="waffle-dot"></span><span class="waffle-dot"></span><span class="waffle-dot"></span>
      </button>
      <div class="waffle-dropdown" id="waffleDropdown"></div>
    </div>

    <div class="nav-bar">
      <button class="nav-btn" id="prevBtn">&#9664;</button>
      <span class="nav-indicator" id="navIndicator">1 / 4</span>
      <button class="nav-btn" id="nextBtn">&#9654;</button>
    </div>
  </div>

  <script>
    // ── Viewport sizing ──────────────────────────────────────
    const vp = document.getElementById('viewport');
    function sizeViewport() {
      const winW = window.innerWidth;
      const winH = window.innerHeight;
      const ratio = 16 / 9;
      let w, h;
      if (winW / winH > ratio) { h = winH; w = h * ratio; }
      else { w = winW; h = w / ratio; }
      vp.style.width = w + 'px';
      vp.style.height = h + 'px';
      document.documentElement.style.setProperty('--vw', (w / 100) + 'px');
    }
    window.addEventListener('resize', sizeViewport);
    sizeViewport();

    // ── Data ─────────────────────────────────────────────────
    const conv1Data = {
      user: "I work in marketing at Idella. We build pension administration software for pension funds and pension administrators in the Netherlands. Our brand voice is professional but approachable — we want to make pensions feel less intimidating.",
      claude: "That's great context! I'll keep your role, audience, and brand voice in mind. How can I help you today?"
    };

    const conv2Data = {
      user: "Write a LinkedIn post about our new self-service portal for participants.",
      claude: "Here's a draft:\n\nPension administration shouldn't feel like a puzzle. That's why we built our new self-service portal — giving participants direct, easy access to their pension information.\n\nFor pension funds and administrators across the Netherlands, this means fewer support calls and happier participants who feel in control of their future.\n\nCurious how it works? Let's talk."
    };

    const memoryTexts = [
      'Marketing at Idella',
      'Pension administration software',
      'Audience: Dutch pension funds & administrators',
      'Brand voice: professional but approachable'
    ];

    // ── DOM refs ─────────────────────────────────────────────
    const conv1El = document.getElementById('conv1');
    const conv2El = document.getElementById('conv2');
    const conv1Messages = document.getElementById('conv1Messages');
    const conv2Messages = document.getElementById('conv2Messages');
    const memoryEmpty = document.getElementById('memoryEmpty');
    const autoSavedLabel = document.getElementById('autoSavedLabel');
    const memCards = memoryTexts.map((_, i) => document.getElementById('mem' + i));
    const memoryHeader = document.getElementById('memoryHeader');
    const contentCard = document.getElementById('contentCard');
    const connectionOverlay = document.getElementById('connectionOverlay');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const navIndicator = document.getElementById('navIndicator');

    // ── Helpers ──────────────────────────────────────────────
    function createBubble(text, type) {
      const el = document.createElement('div');
      el.className = 'chat-bubble ' + type;
      el.textContent = text;
      return el;
    }

    function getVw() {
      return parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--vw'));
    }

    // ── Connection lines ────────────────────────────────────
    function updateConnectionLines(animate) {
      const cardRect = contentCard.getBoundingClientRect();
      // Find the claude response bubble in conv2
      const responseBubble = conv2Messages.querySelector('.chat-bubble.claude');
      if (!responseBubble) return;

      const responseRect = responseBubble.getBoundingClientRect();
      const responseX = responseRect.right - cardRect.left;
      const responseCenterY = responseRect.top + responseRect.height / 2 - cardRect.top;

      memCards.forEach((card, i) => {
        const cRect = card.getBoundingClientRect();
        const startX = cRect.left - cardRect.left;
        const startY = cRect.top + cRect.height / 2 - cardRect.top;
        const endX = responseX;
        const endY = responseCenterY + (i - 1.5) * getVw() * 1.2;

        const line = document.getElementById('connLine' + i);
        const dotS = document.getElementById('connDot' + i + 's');
        const dotE = document.getElementById('connDot' + i + 'e');

        line.setAttribute('x1', startX);
        line.setAttribute('y1', startY);
        line.setAttribute('x2', endX);
        line.setAttribute('y2', endY);
        dotS.setAttribute('cx', startX);
        dotS.setAttribute('cy', startY);
        dotE.setAttribute('cx', endX);
        dotE.setAttribute('cy', endY);

        if (animate) {
          gsap.to(line, { opacity: 0.6, duration: 0.4, delay: i * 0.12 });
          gsap.to(dotS, { opacity: 1, duration: 0.3, delay: i * 0.12 });
          gsap.to(dotE, { opacity: 1, duration: 0.3, delay: i * 0.12 + 0.2 });
          // Animate dash offset for flowing effect
          const length = Math.sqrt(
            Math.pow(endX - startX, 2) + Math.pow(endY - startY, 2)
          );
          line.style.strokeDasharray = '6 4';
          line.style.strokeDashoffset = length;
          gsap.to(line, { strokeDashoffset: 0, duration: 0.8, delay: i * 0.12, ease: 'none' });
        } else {
          line.style.opacity = '0.6';
          dotS.style.opacity = '1';
          dotE.style.opacity = '1';
          line.style.strokeDashoffset = '0';
        }
      });
    }

    function hideConnectionLines() {
      for (let i = 0; i < 4; i++) {
        const line = document.getElementById('connLine' + i);
        const dotS = document.getElementById('connDot' + i + 's');
        const dotE = document.getElementById('connDot' + i + 'e');
        line.style.opacity = '0';
        dotS.style.opacity = '0';
        dotE.style.opacity = '0';
      }
    }

    // ── Render ───────────────────────────────────────────────
    let currentStep = 0;
    const totalSteps = 4;

    function renderUpToStep(step, animate) {
      // Kill any running GSAP animations
      gsap.killTweensOf('*');

      // ── Step 0: First conversation appears ──
      if (step >= 0) {
        conv1Messages.innerHTML = '';
        const userBubble = createBubble(conv1Data.user, 'user');
        const claudeBubble = createBubble(conv1Data.claude, 'claude');
        conv1Messages.appendChild(userBubble);
        conv1Messages.appendChild(claudeBubble);

        if (animate && step === 0) {
          gsap.fromTo(conv1El, { opacity: 0, y: 15 }, { opacity: 1, y: 0, duration: 0.5 });
          gsap.fromTo(userBubble, { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.35, delay: 0.2 });
          gsap.fromTo(claudeBubble, { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.35, delay: 0.4 });
        } else {
          conv1El.style.opacity = '1';
        }
      }

      // Dimming of conv1 (from step 2 onward)
      if (step >= 2) {
        conv1El.classList.add('dimmed');
      } else {
        conv1El.classList.remove('dimmed');
      }

      // ── Step 1: Memory cards get saved ──
      if (step >= 1) {
        if (animate && step === 1) {
          // Capture header position before layout change
          const headerBefore = memoryHeader.getBoundingClientRect();
          memoryEmpty.style.display = 'none';
          // Force layout recalc
          const headerAfter = memoryHeader.getBoundingClientRect();
          const dy = headerBefore.top - headerAfter.top;
          gsap.fromTo(memoryHeader, { y: dy }, { y: 0, duration: 0.5, ease: 'power2.out' });
        } else {
          memoryEmpty.style.display = 'none';
        }

        memCards.forEach((card, i) => {
          if (animate && step === 1) {
            gsap.fromTo(card,
              { opacity: 0, x: -30, scale: 0.9 },
              { opacity: 1, x: 0, scale: 1, duration: 0.45, delay: 0.15 + i * 0.15, ease: 'back.out(1.4)' }
            );
          } else {
            card.style.opacity = '1';
            card.style.transform = 'none';
          }
        });

        if (animate && step === 1) {
          gsap.fromTo(autoSavedLabel, { opacity: 0 }, { opacity: 1, duration: 0.4, delay: 0.85 });
        } else {
          autoSavedLabel.style.opacity = '1';
        }
      } else {
        memoryEmpty.style.display = 'flex';
        memCards.forEach(card => {
          card.style.opacity = '0';
        });
        autoSavedLabel.style.opacity = '0';
      }

      // Remove active state unless step 3
      if (step !== 3) {
        memCards.forEach(card => card.classList.remove('active'));
      }

      // ── Step 2: Second conversation appears ──
      conv2Messages.innerHTML = '';
      if (step >= 2) {
        const userBubble2 = createBubble(conv2Data.user, 'user');
        conv2Messages.appendChild(userBubble2);

        if (animate && step === 2) {
          gsap.fromTo(conv2El, { opacity: 0, y: 15 }, { opacity: 1, y: 0, duration: 0.5 });
          gsap.fromTo(userBubble2, { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.35, delay: 0.2 });
          // Dim first conversation
          gsap.to(conv1El, { duration: 0.4, delay: 0.1,
            onComplete: () => conv1El.classList.add('dimmed')
          });
        } else {
          conv2El.style.opacity = '1';
        }
      } else {
        conv2El.style.opacity = '0';
      }

      // ── Step 3: Memory recalled + tailored response ──
      hideConnectionLines();
      if (step >= 3) {
        // Add the tailored response to conv2
        const userBubble2 = conv2Messages.querySelector('.chat-bubble.user');
        if (!userBubble2) {
          conv2Messages.appendChild(createBubble(conv2Data.user, 'user'));
        }
        const claudeBubble2 = createBubble(conv2Data.claude, 'claude');
        conv2Messages.appendChild(claudeBubble2);

        // Activate memory cards
        memCards.forEach(card => card.classList.add('active'));

        if (animate && step === 3) {
          // Pulse the memory cards
          memCards.forEach((card, i) => {
            gsap.fromTo(card,
              { scale: 1 },
              { scale: 1.04, duration: 0.25, delay: i * 0.1, yoyo: true, repeat: 1, ease: 'power2.inOut',
                onStart: () => card.classList.add('active')
              }
            );
          });

          // Show response after a beat
          gsap.fromTo(claudeBubble2, { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.4, delay: 0.6 });

          // Draw connection lines after response appears
          setTimeout(() => {
            updateConnectionLines(true);
          }, 800);
        } else {
          claudeBubble2.style.opacity = '1';
          // Need a frame for layout to settle before positioning lines
          requestAnimationFrame(() => updateConnectionLines(false));
        }
      }
    }

    // ── Navigation ───────────────────────────────────────────
    function goToStep(n) {
      if (n < 0 || n >= totalSteps) return;
      const forward = n > currentStep;
      currentStep = n;
      renderUpToStep(n, forward);
      navIndicator.textContent = `${n + 1} / ${totalSteps}`;
      prevBtn.disabled = (n === 0);
      nextBtn.disabled = (n === totalSteps - 1);
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') goToStep(currentStep + 1);
      if (e.key === 'ArrowLeft') goToStep(currentStep - 1);
    });

    prevBtn.addEventListener('click', () => goToStep(currentStep - 1));
    nextBtn.addEventListener('click', () => goToStep(currentStep + 1));

    // Initialize
    navIndicator.textContent = `1 / ${totalSteps}`;
    prevBtn.disabled = true;
    nextBtn.disabled = false;
    renderUpToStep(0, false);

    // Reposition connection lines on resize
    window.addEventListener('resize', () => {
      if (currentStep >= 3) {
        requestAnimationFrame(() => updateConnectionLines(false));
      }
    });

    // ── Waffle Menu ──────────────────────────────────────────
    const VISUALIZATIONS = [
      { slug: 'context-window', title: 'The Context Window' },
      { slug: 'memory-types', title: 'LLM Memory Types' },
      { slug: 'claude-memory', title: "Claude's Memory" },
    ];

    const waffleBtn = document.getElementById('waffleBtn');
    const waffleDropdown = document.getElementById('waffleDropdown');
    const pathParts = window.location.pathname.replace(/\/index\.html$/, '').split('/').filter(Boolean);
    const currentSlug = pathParts[pathParts.length - 1] || '';

    const header = document.createElement('div');
    header.className = 'waffle-dropdown-header';
    header.textContent = 'Visualizations';
    waffleDropdown.appendChild(header);

    VISUALIZATIONS.forEach((viz, i) => {
      const a = document.createElement('a');
      a.href = '../' + viz.slug + '/index.html';
      const num = document.createElement('span');
      num.className = 'viz-num';
      num.textContent = i + 1;
      a.appendChild(num);
      a.appendChild(document.createTextNode(viz.title));
      if (viz.slug === currentSlug) a.classList.add('current');
      waffleDropdown.appendChild(a);
    });

    waffleBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = waffleDropdown.classList.toggle('open');
      waffleBtn.classList.toggle('open', isOpen);
    });
    document.addEventListener('click', () => {
      waffleDropdown.classList.remove('open');
      waffleBtn.classList.remove('open');
    });
  </script>
</body>
</html>
